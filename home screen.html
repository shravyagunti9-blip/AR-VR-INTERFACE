<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Camera View</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Camera background */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* Furniture object */
#furniture {
    position: absolute;
    top: 40%;
    left: 40%;
    width: 200px;
    cursor: grab;
    transition: transform 0.2s;
}

/* Control panel */
.controls {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 15px;
    text-align: center;
}

.controls input {
    width: 150px;
}
button {
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    background: #2a5298;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #1e3c72;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<img id="furniture" src="" alt="Furniture">

<div class="controls">
    Rotate:
    <input type="range" id="rotate" min="0" max="360">
    
    Resize:
    <input type="range" id="resize" min="100" max="400">

    <button onclick="capture()">Capture</button>
</div>

<script>
const video = document.getElementById("camera");
const furniture = document.getElementById("furniture");
const rotateSlider = document.getElementById("rotate");
const resizeSlider = document.getElementById("resize");

/* Start Camera */
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("Camera access denied!");
});

/* Load selected furniture */
const selected = localStorage.getItem("selectedFurniture");

if(selected === "Sofa"){
    furniture.src = "https://pngimg.com/uploads/sofa/sofa_PNG6941.png";
}
else if(selected === "Table"){
    furniture.src = "https://pngimg.com/uploads/table/table_PNG7005.png";
}
else if(selected === "Plant"){
    furniture.src = "https://pngimg.com/uploads/palm_tree/palm_tree_PNG2491.png";
}
else if(selected === "Lamp"){
    furniture.src = "https://pngimg.com/uploads/lamp/lamp_PNG1000.png";
}

/* Drag to move */
let isDragging = false;
let offsetX, offsetY;

furniture.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - furniture.offsetLeft;
    offsetY = e.clientY - furniture.offsetTop;
});

document.addEventListener("mousemove", (e) => {
    if(isDragging){
        furniture.style.left = (e.clientX - offsetX) + "px";
        furniture.style.top = (e.clientY - offsetY) + "px";
    }
});

document.addEventListener("mouseup", () => {
    isDragging = false;
});

/* Rotate */
rotateSlider.addEventListener("input", () => {
    furniture.style.transform =
        `rotate(${rotateSlider.value}deg) scale(${resizeSlider.value/200})`;
});

/* Resize */
resizeSlider.addEventListener("input", () => {
    furniture.style.transform =
        `rotate(${rotateSlider.value}deg) scale(${resizeSlider.value/200})`;
});

/* Capture Screenshot */
function capture(){
    alert("Screenshot captured! (For real capture use html2canvas library)");
}
</script>

</body>
</html>
